# Learn more about configuring your checkout UI extension:
# https://shopify.dev/docs/api/checkout-ui-extensions/latest/configuration

# The version of APIs your extension will receive. Learn more:
# https://shopify.dev/docs/api/usage/versioning
api_version = "2026-01"

[[extensions]]
name = "carousel"
handle = "carousel"
type = "ui_extension"
uid = "1f555a1e-2e8b-2bd1-8906-c2df238d919d2cd8209f"

# Controls where in Shopify your extension will be injected,
# and the file that contains your extension’s source code. Learn more:
# https://shopify.dev/docs/api/checkout-ui-extensions/latest/extension-targets-overview

[[extensions.targeting]]
module = "./src/Checkout.jsx"
target = "purchase.checkout.block.render"

[extensions.capabilities]
# Gives your extension access to directly query Shopify’s storefront API.
# https://shopify.dev/docs/api/checkout-ui-extensions/latest/configuration#api-access
api_access = true

# Gives your extension access to make external network calls, using the
# JavaScript `fetch()` API. Learn more:
# https://shopify.dev/docs/api/checkout-ui-extensions/latest/configuration#network-access
# network_access = true

# Loads metafields on checkout resources, including the cart,
# products, customers, and more. Learn more:
# https://shopify.dev/docs/api/checkout-ui-extensions/latest/configuration#metafields

[[extensions.metafields]]
namespace = "$app"
key = "requestedFreeGift"

# Defines settings that will be collected from merchants installing
# your extension. Learn more:
# https://shopify.dev/docs/api/checkout-ui-extensions/latest/configuration#settings-definition

# [extensions.settings]
# [[extensions.settings.fields]]
# key = "banner_title"
# type = "single_line_text_field"
# name = "Banner title"
# description = "Enter a title for the banner"

[extensions.settings]

# Optional header text (matches your Trustpilot-like header)
[[extensions.settings.fields]]
key = "header_label"
type = "single_line_text_field"
name = "Header label"
description = "Example: Excellent"

[[extensions.settings.fields]]
key = "brand_label"
type = "single_line_text_field"
name = "Brand label"
description = "Example: Trustpilot (or your brand)"

[[extensions.settings.fields]]
key = "header_rating"
type = "number_integer"
name = "Header rating (1–5)"
description = "Stars shown in the header"
[[extensions.settings.fields.validations]]
name = "min"
value = "1"
[[extensions.settings.fields.validations]]
name = "max"
value = "5"

# ===== Testimonial 1 =====
[[extensions.settings.fields]]
key = "t1_title"
type = "single_line_text_field"
name = "Testimonial 1 — Title"

[[extensions.settings.fields]]
key = "t1_body"
type = "multi_line_text_field"
name = "Testimonial 1 — Body"

[[extensions.settings.fields]]
key = "t1_author"
type = "single_line_text_field"
name = "Testimonial 1 — Author"

[[extensions.settings.fields]]
key = "t1_meta"
type = "single_line_text_field"
name = "Testimonial 1 — Meta (e.g., 2 days ago)"

[[extensions.settings.fields]]
key = "t1_rating"
type = "number_integer"
name = "Testimonial 1 — Rating (1–5)"
[[extensions.settings.fields.validations]]
name = "min"
value = "1"
[[extensions.settings.fields.validations]]
name = "max"
value = "5"

# ===== Testimonial 2 =====
[[extensions.settings.fields]]
key = "t2_title"
type = "single_line_text_field"
name = "Testimonial 2 — Title"

[[extensions.settings.fields]]
key = "t2_body"
type = "multi_line_text_field"
name = "Testimonial 2 — Body"

[[extensions.settings.fields]]
key = "t2_author"
type = "single_line_text_field"
name = "Testimonial 2 — Author"

[[extensions.settings.fields]]
key = "t2_meta"
type = "single_line_text_field"
name = "Testimonial 2 — Meta"

[[extensions.settings.fields]]
key = "t2_rating"
type = "number_integer"
name = "Testimonial 2 — Rating (1–5)"
[[extensions.settings.fields.validations]]
name = "min"
value = "1"
[[extensions.settings.fields.validations]]
name = "max"
value = "5"

# Repeat t3_*, t4_*, t5_* as needed
[[extensions.settings.fields]]
key = "t3_title"
type = "single_line_text_field"
name = "Testimonial 3 — Title"

[[extensions.settings.fields]]
key = "t3_body"
type = "multi_line_text_field"
name = "Testimonial 3 — Body"

[[extensions.settings.fields]]
key = "t3_author"
type = "single_line_text_field"
name = "Testimonial 3 — Author"

[[extensions.settings.fields]]
key = "t3_meta"
type = "single_line_text_field"
name = "Testimonial 3 — Meta"

[[extensions.settings.fields]]
key = "t3_rating"
type = "number_integer"
name = "Testimonial 3 — Rating (1–5)"
[[extensions.settings.fields.validations]]
name = "min"
value = "1"
[[extensions.settings.fields.validations]]
name = "max"
value = "5"